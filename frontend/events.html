<!DOCTYPE html>
<html>
<head>
  <title>Event Logs</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/navigation.js"></script>
</head>

<body class="plain-bg">

<header class="top-bar">
  <span class="title">Smart Surveillance System</span>
  <span class="menu-icon" onclick="toggleMenu()">☰</span>
</header>

<div id="sideMenu" class="side-menu">
  <a href="dashboard.html">Dashboard</a>
  <a href="events.html">Event Logs</a>
  <a href="javascript:void(0);" onclick="logout()">Logout</a>
</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search..." onkeyup="searchTable()">
</div>

<div class="table-box">
  <table>
    <tr>
      <th>Timestamp</th>
      <th>AnimalType</th>
      <th>Location</th>
      <th>ProximityLevel</th>
      <th>PredictedBehaviour</th>
      <th>Details</th>
    </tr>
    <tbody id="eventsBody"></tbody>
  </table>
</div>

<script>
const token = localStorage.getItem("token");
if (!token) window.location = "login.html";

function viewEventById(eventId) {
  window.location.href = "event_details.html?id=" + encodeURIComponent(eventId);
}

fetch("https://smart-surveillance-system-production.up.railway.app/events", {
  headers: {
    "Authorization": "Bearer " + token
  }
})
.then(response => response.json())
.then(events => {

  const body = document.getElementById("eventsBody");
  body.innerHTML = "";

  if (!events || events.length === 0) {
    body.innerHTML = `<tr><td colspan="6">No events found</td></tr>`;
    return;
  }

  events.forEach(e => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${e.Timestamp ?? ""}</td>
      <td>${e.AnimalType ?? ""}</td>
      <td>${e.Location ?? ""}</td>
      <td>${e.ProximityLevel ?? ""}</td>
      <td>${e.PredictedBehaviour ?? ""}</td>
      <td>
        <button class="view-btn" onclick="viewEventById('${e.EventID ?? ""}')">View</button>
      </td>
    `;
    body.appendChild(row);
  });

})
.catch(err => {
  console.error(err);
  alert("Backend not reachable. Please run Flask server.");
});
</script>
<script>
function logout() {
  localStorage.removeItem("token");
  window.location.replace("index.html");
}
</script>
</body>
</html>
